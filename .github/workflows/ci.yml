name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: JS (server + SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  mcp:
    name: MCP adapter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install root deps (parent SDK)
        run: npm ci
        working-directory: .
      - name: Build parent SDK
        run: npm run build
        working-directory: .
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  python:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    needs: js
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
        working-directory: sdk-py
      - run: pytest -q
        working-directory: sdk-py
