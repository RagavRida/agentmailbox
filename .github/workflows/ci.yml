name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: JS (server + SDK + MCP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      - name: Verify MCP bin has shebang
        run: head -1 dist/mcp/index.js | grep -q '#!/usr/bin/env node'

  langgraph:
    name: LangGraph adapter
    runs-on: ubuntu-latest
    needs: js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
        name: Build main package (agentsmcp)
      - name: Install LangGraph deps against local agentsmcp
        run: npm install --no-save file:..
        working-directory: langgraph
      - run: npm ci
        working-directory: langgraph
      - run: npm run build
        working-directory: langgraph
      - run: npm test
        working-directory: langgraph

  python:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    needs: js
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
        working-directory: sdk-py
      - run: pytest -q
        working-directory: sdk-py

